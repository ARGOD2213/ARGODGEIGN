<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARGODREIGN IoT Command Center</title>
  <style>
    :root {
      --bg: #f3f6f9;
      --ink: #102a43;
      --card: #ffffff;
      --line: #d9e2ec;
      --good: #2f855a;
      --warn: #d69e2e;
      --crit: #c53030;
      --accent: #0b7285;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at top right, #d4f1f4 0%, var(--bg) 55%);
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: 0.2px;
    }
    .sub { color: #486581; }
    .btn {
      border: 0;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .grid {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(16, 42, 67, 0.05);
    }
    .label { color: #627d98; font-size: 0.86rem; }
    .value { font-size: 1.55rem; font-weight: 700; margin-top: 6px; }
    .good { color: var(--good); }
    .warn { color: var(--warn); }
    .crit { color: var(--crit); }
    .sections {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 12px;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    .table th, .table td {
      padding: 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
    }
    .pill {
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.75rem;
      font-weight: 600;
      display: inline-block;
    }
    .pill.NORMAL { background: #def7ec; color: #03543f; }
    .pill.WARNING { background: #fff8db; color: #8d6e00; }
    .pill.CRITICAL { background: #ffe3e3; color: #9b2c2c; }
    .mono { font-family: Consolas, Menlo, monospace; }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      .sections { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>ARGODREIGN IoT Command Center</h1>
        <div class="sub" id="lastUpdated">Loading...</div>
      </div>
      <button class="btn" onclick="refreshNow()">Refresh</button>
    </div>

    <div class="grid">
      <div class="card"><div class="label">Live Events</div><div class="value" id="liveCount">0</div></div>
      <div class="card"><div class="label">Critical</div><div class="value crit" id="criticalCount">0</div></div>
      <div class="card"><div class="label">Warning</div><div class="value warn" id="warningCount">0</div></div>
      <div class="card"><div class="label">Avg AI Risk</div><div class="value" id="avgRisk">0</div></div>
    </div>

    <div class="sections">
      <div class="card">
        <h3>Latest Events</h3>
        <table class="table" id="eventsTable">
          <thead>
            <tr><th>Time</th><th>Device</th><th>Sensor</th><th>Value</th><th>Status</th><th>Risk</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="card">
        <h3>Top Sensors (Live)</h3>
        <table class="table" id="sensorTable">
          <thead><tr><th>Sensor</th><th>Events</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    async function loadOverview() {
      const res = await fetch('/api/v1/dashboard/overview');
      if (!res.ok) throw new Error('Failed to load dashboard overview');
      const data = await res.json();

      document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date(data.lastUpdated).toLocaleString();
      document.getElementById('liveCount').textContent = data.liveEventCount ?? 0;
      document.getElementById('criticalCount').textContent = data.criticalCount ?? 0;
      document.getElementById('warningCount').textContent = data.warningCount ?? 0;
      document.getElementById('avgRisk').textContent = data.averageAiRiskScore ?? 0;

      const eventsBody = document.querySelector('#eventsTable tbody');
      eventsBody.innerHTML = '';
      (data.latestEvents || []).forEach(e => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="mono">${(e.timestamp || '').replace('T', ' ').replace('Z', '')}</td>
          <td>${e.deviceId || '-'}</td>
          <td>${e.sensorType || '-'}</td>
          <td>${e.value ?? '-'} ${e.unit || ''}</td>
          <td><span class="pill ${e.status || 'NORMAL'}">${e.status || 'NORMAL'}</span></td>
          <td>${e.aiRiskScore ?? 'N/A'}</td>`;
        eventsBody.appendChild(tr);
      });

      const sensorBody = document.querySelector('#sensorTable tbody');
      sensorBody.innerHTML = '';
      (data.topSensors || []).forEach(s => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${s.sensorType}</td><td>${s.count}</td>`;
        sensorBody.appendChild(tr);
      });
    }

    async function refreshNow() {
      try { await loadOverview(); }
      catch (e) { document.getElementById('lastUpdated').textContent = 'Dashboard error: ' + e.message; }
    }

    refreshNow();
    setInterval(refreshNow, 10000);
  </script>
</body>
</html>
