spring.application.name=ARGODREIGN-IoT-Alert-Engine
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── MySQL ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://mysql:3306/iotdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=rootpass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ── Redis ─────────────────────────────────────────────────────────────────────
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# ── AWS ───────────────────────────────────────────────────────────────────────
aws.region=${AWS_REGION:ap-south-1}
aws.sns.topic.arn=${AWS_SNS_TOPIC_ARN:}
aws.sqs.queue.url=${AWS_SQS_QUEUE_URL:}
aws.sqs.dlq.url=${AWS_SQS_DLQ_URL:}
aws.ec2.instance.id=${EC2_INSTANCE_ID:}

# Athena analytics (Sprint 1)
athena.enabled=${ATHENA_ENABLED:true}
athena.database=${ATHENA_DATABASE:argodreign_analytics}
athena.table=${ATHENA_TABLE:sensor_events_partitioned}
athena.output.location=${ATHENA_OUTPUT_LOCATION:s3://iot-alert-engine-mahindra/athena-results/}
athena.poll.interval.ms=${ATHENA_POLL_INTERVAL_MS:1500}
athena.query.timeout.seconds=${ATHENA_QUERY_TIMEOUT_SECONDS:45}
athena.max.results=${ATHENA_MAX_RESULTS:1000}

# Platform status
platform.rule.engine.mode=${PLATFORM_RULE_ENGINE_MODE:LAMBDA}
platform.environment=${PLATFORM_ENVIRONMENT:demo}
argus.dashboard.username=${ARGUS_DASHBOARD_USER:argus}
argus.dashboard.password=${ARGUS_DASHBOARD_PASS:changeme}

# ── Weather API ───────────────────────────────────────────────────────────────
weather.api.key=${WEATHER_API_KEY:}
weather.api.url=https://api.openweathermap.org/data/2.5/weather
weather.cache.ttl.minutes=10

# ── AI / LLM ─────────────────────────────────────────────────────────────────
ai.gemini.api.key=${GEMINI_API_KEY:}
ai.anthropic.api.key=${ANTHROPIC_API_KEY:}
ai.openai.api.key=${OPENAI_API_KEY:}
ai.analysis.enabled=${AI_ANALYSIS_ENABLED:true}
ai.gemini.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent
ai.gemini.rate.limit.minutes=${AI_GEMINI_RATE_LIMIT_MINUTES:5}
ai.analysis.cache.bucket=${AI_ANALYSIS_CACHE_BUCKET:iot-alert-engine-mahindra}
ai.analysis.cache.prefix=${AI_ANALYSIS_CACHE_PREFIX:llm-cache}
ai.analysis.cache.ttl.minutes=${AI_ANALYSIS_CACHE_TTL_MINUTES:30}

# ── Cache ─────────────────────────────────────────────────────────────────────
spring.cache.type=${SPRING_CACHE_TYPE:caffeine}
spring.cache.redis.time-to-live=60000

# ── Scheduling ────────────────────────────────────────────────────────────────
spring.task.scheduling.pool.size=5
simulator.enabled=${SIMULATOR_ENABLED:false}

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Swagger ───────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.mahindra.iot=INFO
logging.level.software.amazon.awssdk=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
