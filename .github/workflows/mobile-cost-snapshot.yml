name: Mobile Cost Snapshot

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: "AWS region for auth (Cost Explorer is global)"
        required: true
        default: "ap-south-1"
        type: string
      aws_role_to_assume:
        description: "Optional IAM role ARN for OIDC (recommended)"
        required: false
        default: ""
        type: string
      monthly_budget_usd:
        description: "Your target monthly budget in USD"
        required: true
        default: "23.33"
        type: string

jobs:
  cost:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Configure AWS credentials (OIDC)
        if: ${{ inputs.aws_role_to_assume != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_to_assume }}
          role-session-name: gh-mobile-cost
          aws-region: ${{ inputs.aws_region }}

      - name: Configure AWS credentials (static keys fallback)
        if: ${{ inputs.aws_role_to_assume == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Fetch monthly cost
        shell: bash
        run: |
          set -euo pipefail

          START="$(date -u +%Y-%m-01)"
          END="$(date -u -d '+1 day' +%Y-%m-%d)"
          BUDGET="${{ inputs.monthly_budget_usd }}"

          aws ce get-cost-and-usage \
            --time-period Start="$START",End="$END" \
            --granularity MONTHLY \
            --metrics UnblendedCost \
            --output json > cost-total.json

          aws ce get-cost-and-usage \
            --time-period Start="$START",End="$END" \
            --granularity MONTHLY \
            --metrics UnblendedCost \
            --group-by Type=DIMENSION,Key=SERVICE \
            --output json > cost-by-service.json

          TOTAL="$(jq -r '.ResultsByTime[0].Total.UnblendedCost.Amount // "0"' cost-total.json)"
          UNIT="$(jq -r '.ResultsByTime[0].Total.UnblendedCost.Unit // "USD"' cost-total.json)"
          PCT="$(awk -v total="$TOTAL" -v budget="$BUDGET" 'BEGIN { if (budget > 0) printf "%.2f", (total / budget) * 100; else print "0.00" }')"

          jq -r '.ResultsByTime[0].Groups
                 | sort_by((.Metrics.UnblendedCost.Amount | tonumber))
                 | reverse
                 | .[:10]
                 | .[]
                 | "- " + .Keys[0] + ": $" + (.Metrics.UnblendedCost.Amount | tonumber | tostring)' cost-by-service.json > top-services.txt

          {
            echo "## Mobile Cost Snapshot"
            echo ""
            echo "- Month start: $START"
            echo "- Cost till now: $TOTAL $UNIT"
            echo "- Budget target: $BUDGET USD"
            echo "- Budget used: $PCT%"
            echo ""
            echo "### Top Services (current month)"
            cat top-services.txt
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload cost artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cost-snapshot
          path: |
            cost-total.json
            cost-by-service.json
            top-services.txt
