name: "Review Inbox Sync"

on:
  issues:
    types: [opened, edited, reopened, labeled]
  issue_comment:
    types: [created, edited]

permissions:
  contents: write
  issues: read

jobs:
  sync-review:
    if: startsWith(github.event.issue.title, '[REVIEW]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build inbox files
        env:
          EVENT_PATH: ${{ github.event_path }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail

          ISSUE_NUMBER=$(jq -r '.issue.number' "$EVENT_PATH")
          ISSUE_TITLE=$(jq -r '.issue.title' "$EVENT_PATH")
          ISSUE_URL=$(jq -r '.issue.html_url' "$EVENT_PATH")
          ISSUE_BODY=$(jq -r '.issue.body // ""' "$EVENT_PATH")
          ACTION=$(jq -r '.action // ""' "$EVENT_PATH")
          COMMENT_URL=$(jq -r '.comment.html_url // ""' "$EVENT_PATH")
          COMMENT_BODY=$(jq -r '.comment.body // ""' "$EVENT_PATH")
          NOW_UTC=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p docs

          {
            echo "# Review Inbox (Auto Synced)"
            echo ""
            echo "- Repository: $REPO"
            echo "- Updated UTC: $NOW_UTC"
            echo "- Event: $EVENT_NAME/$ACTION"
            echo "- Issue: #$ISSUE_NUMBER"
            echo "- Link: $ISSUE_URL"
            echo "- Actor: $ACTOR"
            echo ""
            echo "## Issue Title"
            echo "$ISSUE_TITLE"
            echo ""
            echo "## Issue Body"
            echo '```text'
            printf "%s\n" "$ISSUE_BODY"
            echo '```'
            echo ""
            if [ -n "$COMMENT_BODY" ]; then
              echo "## Latest Comment"
              echo "- Link: $COMMENT_URL"
              echo '```text'
              printf "%s\n" "$COMMENT_BODY"
              echo '```'
            fi
          } > docs/REVIEW_INBOX.md

          {
            echo "## $NOW_UTC | #$ISSUE_NUMBER | $EVENT_NAME/$ACTION"
            echo "- Link: $ISSUE_URL"
            if [ -n "$COMMENT_URL" ]; then
              echo "- Comment: $COMMENT_URL"
            fi
            echo "- Actor: $ACTOR"
            echo ""
          } >> docs/REVIEW_LOG.md

      - name: Commit synced docs
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/REVIEW_INBOX.md docs/REVIEW_LOG.md; then
            echo "No file changes."
            exit 0
          fi
          git config user.name "argodreign-bot"
          git config user.email "argodreign-bot@users.noreply.github.com"
          git add docs/REVIEW_INBOX.md docs/REVIEW_LOG.md
          git commit -m "chore: sync reviewer inbox #${{ github.event.issue.number }}"
          git push
