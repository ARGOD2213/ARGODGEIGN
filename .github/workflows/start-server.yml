name: "📱 START IoT Server"

on:
  workflow_dispatch:

jobs:
  start:
    name: Start EC2 and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build application JAR
        run: mvn -q -DskipTests package

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Start EC2 instance
        run: |
          aws ec2 start-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --region ap-south-1
          echo "⏳ Waiting for EC2 to start..."
          aws ec2 wait instance-running \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --region ap-south-1
          echo "✅ EC2 is running"

      - name: Get EC2 public IP
        id: get-ip
        run: |
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text --region ap-south-1)
          echo "public_ip=$PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "EC2 Public IP: $PUBLIC_IP"

      - name: Wait for EC2 to be ready
        run: |
          aws ec2 wait instance-status-ok \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --region ap-south-1

      - name: Prepare runtime env file
        run: |
          DASHBOARD_USER="${{ secrets.ARGUS_DASHBOARD_USER }}"
          DASHBOARD_PASS="${{ secrets.ARGUS_DASHBOARD_PASS }}"
          if [ -z "$DASHBOARD_USER" ]; then DASHBOARD_USER="argus"; fi
          if [ -z "$DASHBOARD_PASS" ]; then DASHBOARD_PASS="changeme"; fi
          mkdir -p deploy
          cat > deploy/app.env << EOF
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION=ap-south-1
          EC2_INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          AWS_SNS_TOPIC_ARN=arn:aws:sns:ap-south-1:061039801536:iot-alerts
          AWS_SQS_QUEUE_URL=https://sqs.ap-south-1.amazonaws.com/061039801536/iot-events.fifo
          AWS_SQS_DLQ_URL=https://sqs.ap-south-1.amazonaws.com/061039801536/iot-events-dlq.fifo
          ATHENA_ENABLED=true
          ATHENA_DATABASE=argodreign_analytics
          ATHENA_TABLE=sensor_events_partitioned
          ATHENA_OUTPUT_LOCATION=s3://iot-alert-engine-mahindra/athena-results/
          PLATFORM_RULE_ENGINE_MODE=LAMBDA
          PLATFORM_ENVIRONMENT=demo
          WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY=
          OPENAI_API_KEY=
          AI_ANALYSIS_ENABLED=true
          SIMULATOR_ENABLED=false
          SPRING_CACHE_TYPE=caffeine
          ARGUS_DASHBOARD_USER=$DASHBOARD_USER
          ARGUS_DASHBOARD_PASS=$DASHBOARD_PASS
          EOF

      - name: Copy JAR and env file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.get-ip.outputs.public_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/iot-alert-engine-2.0.0.jar,deploy/app.env"
          target: "/home/ec2-user"
          strip_components: 1

      - name: Start app on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.public_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            sudo yum install -y java-17-amazon-corretto-headless >/dev/null 2>&1 || true
            mkdir -p /home/ec2-user/argodreign-run
            cd /home/ec2-user/argodreign-run

            # Resolve uploaded files robustly (mobile runs can vary in path structure)
            JAR_SRC=$(find /home/ec2-user -maxdepth 5 -type f -name "iot-alert-engine-2.0.0.jar" | head -n 1 || true)
            ENV_SRC=$(find /home/ec2-user -maxdepth 5 -type f -name "app.env" | head -n 1 || true)
            if [ -z "$JAR_SRC" ]; then
              echo "ERROR: iot-alert-engine-2.0.0.jar not found under /home/ec2-user"
              find /home/ec2-user -maxdepth 5 -type f | sed 's/^/FOUND: /'
              exit 1
            fi
            if [ -z "$ENV_SRC" ]; then
              echo "ERROR: app.env not found under /home/ec2-user"
              find /home/ec2-user -maxdepth 5 -type f | sed 's/^/FOUND: /'
              exit 1
            fi
            cp "$JAR_SRC" /home/ec2-user/argodreign-run/iot-alert-engine-2.0.0.jar
            cp "$ENV_SRC" /home/ec2-user/argodreign-run/app.env.runtime

            set -a
            . ./app.env.runtime
            set +a
            pkill -f iot-alert-engine-2.0.0.jar || true
            nohup java -jar iot-alert-engine-2.0.0.jar > app.log 2>&1 &
            for attempt in $(seq 1 24); do
              if curl -fsS http://127.0.0.1:8080/api/v1/health >/dev/null; then
                echo "Application health endpoint is responding"
                exit 0
              fi
              if ! pgrep -af iot-alert-engine-2.0.0.jar >/dev/null; then
                echo "ERROR: app process exited before health check passed. Last app.log lines:"
                tail -n 120 /home/ec2-user/argodreign-run/app.log || true
                exit 1
              fi
              echo "Waiting for application health... attempt $attempt/24"
              sleep 5
            done
            echo "ERROR: application did not become healthy in time. Last app.log lines:"
            tail -n 120 /home/ec2-user/argodreign-run/app.log || true
            exit 1

      - name: Verify public health endpoint
        run: |
          PUBLIC_IP=${{ steps.get-ip.outputs.public_ip }}
          for attempt in $(seq 1 18); do
            if curl -fsS "http://$PUBLIC_IP:8080/api/v1/health" >/dev/null; then
              echo "Public health endpoint is reachable"
              exit 0
            fi
            echo "Waiting for public health endpoint... attempt $attempt/18"
            sleep 10
          done
          echo "ERROR: public health endpoint did not respond in time"
          exit 1

      - name: Print live URLs
        run: |
          PUBLIC_IP=${{ steps.get-ip.outputs.public_ip }}
          DASHBOARD_USER="${{ secrets.ARGUS_DASHBOARD_USER }}"
          if [ -z "$DASHBOARD_USER" ]; then DASHBOARD_USER="argus"; fi
          {
            echo "## 🚀 ARGODREIGN IS LIVE"
            echo ""
            echo "- Dashboard: http://$PUBLIC_IP:8080/"
            echo "- Health: http://$PUBLIC_IP:8080/api/v1/health"
            echo "- Swagger: http://$PUBLIC_IP:8080/swagger-ui.html"
            echo "- Alerts: http://$PUBLIC_IP:8080/api/v1/alerts/history"
            echo "- Platform Status: http://$PUBLIC_IP:8080/api/platform/status"
            echo "- DLQ Status: http://$PUBLIC_IP:8080/api/admin/dlq-status"
            echo "- Machines: http://$PUBLIC_IP:8080/api/machines"
            if [ -z "${{ secrets.ARGUS_DASHBOARD_PASS }}" ]; then
              echo "- Login: $DASHBOARD_USER / changeme"
            else
              echo "- Login: $DASHBOARD_USER / ARGUS_DASHBOARD_PASS secret"
            fi
            echo ""
            echo "💡 Open these URLs on your phone browser."
            echo "💡 Run STOP workflow after demo to stop billing."
          } >> "$GITHUB_STEP_SUMMARY"
